services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: startup_saas_app
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    depends_on:
      - mysql
      - mongodb
    networks:
      - startup_saas_network

  nginx:
    image: nginx:alpine
    container_name: startup_saas_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - startup_saas_network

  frontend:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    container_name: startup_saas_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - startup_saas_network

  mysql:
    image: mysql:8.0
    container_name: startup_saas_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: startup_saas
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: saas_user
      MYSQL_PASSWORD: saas_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - startup_saas_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: startup_saas_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - startup_saas_network

  mongodb:
    image: mongo:7.0
    container_name: startup_saas_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - startup_saas_network

  mongo-express:
    image: mongo-express:1.0.2
    container_name: startup_saas_mongo_express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: root
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
    networks:
      - startup_saas_network

volumes:
  mysql_data:
  mongodb_data:
  frontend_node_modules:

networks:
  startup_saas_network:
    driver: bridge